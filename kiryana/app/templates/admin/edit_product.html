{% extends 'base.html' %}
{% block title %}Edit Product - Admin{% endblock %}
{% block content %}
<div class="mb-3"><a href="{{ url_for('admin.catalog') }}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Catalog</a></div>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2"></i>Edit Product</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Product Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required autofocus value="{{ product.name }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Brand</label>
          <input type="text" name="brand" class="form-control" value="{{ product.brand or '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Unit</label>
          <select name="unit" class="form-select">
            {% for unit in ['piece', 'kg', 'gram', 'litre', 'pack', 'dozen'] %}
            <option value="{{ unit }}" {% if product.unit == unit %}selected{% endif %}>{{ unit|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Default Price (Rs.)</label>
          <input type="number" name="default_price" class="form-control" min="0" step="0.5" value="{{ product.default_price }}">
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
