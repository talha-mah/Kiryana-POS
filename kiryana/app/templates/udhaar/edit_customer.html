{% extends 'base.html' %}
{% block title %}Edit Customer - Kiryana{% endblock %}
{% block content %}
<div class="mb-3"><a href="{{ url_for('udhaar.customer_detail', customer_id=customer.id) }}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Customer</a></div>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2"></i>Edit Customer</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Customer Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required autofocus value="{{ customer.name }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-control" value="{{ customer.phone or '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Credit Limit (Rs.)</label>
          <input type="number" name="credit_limit" class="form-control" value="{{ customer.credit_limit }}" min="0">
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
