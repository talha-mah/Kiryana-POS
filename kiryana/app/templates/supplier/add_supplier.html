{% extends 'base.html' %}
{% block title %}Add Supplier — Kiryana{% endblock %}
{% block content %}
<div class="mb-3"><a href="{{ url_for('supplier.index') }}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-truck me-2"></i>Add New Supplier</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Supplier Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required autofocus placeholder="e.g. Shan Foods, Local Bread Wala">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-control" placeholder="03xx-xxxxxxx">
        </div>
        <div class="mb-3">
          <label class="form-label">Payment Terms (days)</label>
          <input type="number" name="payment_terms_days" class="form-control" value="7" min="1" max="90">
          <div class="form-text">How many days until payment is due after delivery.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Supplier</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
