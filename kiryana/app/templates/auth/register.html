{% extends 'base.html' %}
{% block title %}Register Admin — Kiryana{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4">
      <h2 style="color:var(--k-green); font-weight:700;"><i class="bi bi-shop me-2"></i>Kiryana</h2>
      <p class="text-muted">Create Admin Account</p>
    </div>
    <div class="card p-4">
      <h5 class="mb-3">First Time Setup</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Admin Account</button>
      </form>
    </div>
    <p class="text-center mt-3 text-muted small">
      Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
      <br>
      Registering a shop? <a href="{{ url_for('auth.shop_register') }}">Request shop owner access</a>
    </p>
  </div>
</div>
{% endblock %}
